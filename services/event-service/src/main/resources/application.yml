server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: event-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bookingdb}
    username: ${SPRING_DATASOURCE_USERNAME:booking_app}
    password: ${SPRING_DATASOURCE_PASSWORD:booking_app}
  flyway:
    enabled: false
  sql:
    init:
      mode: never
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  seed:
    demo-data: ${APP_SEED_DEMO_DATA:true}
  security:
    allowed-origins: ${APP_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}
    jwt:
      secret: ${APP_JWT_SECRET:replace-this-with-a-long-development-secret-at-least-32-chars}
    cookie:
      name: ${APP_AUTH_COOKIE_NAME:booking_access_token}

